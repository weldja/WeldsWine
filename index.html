<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welds Wine Wisdoms</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
/* ============================================================
 Welds Wine Wisdoms — v4 (patched)
 ============================================================ */
:root {
  --burgundy: #6B2737;
  --burgundy-deep: #4A1424;
  --burgundy-lt: #8B3A4A;
  --blush: #C4788A;
  --parchment: #F5EFE6;
  --cream: #FAF7F2;
  --ivory: #FFFEF9;
  --charcoal: #2C2420;
  --warm-gray: #6B5D58;
  --light-gray: #E8DDD6;
  --gold: #C9A84C;
  --gold-lt: #E8C87A;
  --shadow: rgba(44,36,32,0.12);
  --shadow-lg: rgba(44,36,32,0.22);
  --font-d: 'Playfair Display', Georgia, serif;
  --font-b: 'Cormorant Garamond', Georgia, serif;
  --font-s: 'EB Garamond', Georgia, serif;
  --r: 4px; --rl: 8px; --tr: 0.22s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--cream);color:var(--charcoal);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.site-header{background:var(--burgundy-deep);border-bottom:1px solid var(--burgundy);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(44,20,36,.35)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{font-size:24px;line-height:1}
.logo-title{font-family:var(--font-d);font-size:1.25rem;font-weight:600;color:var(--parchment);letter-spacing:.05em;line-height:1}
.logo-sub{font-family:var(--font-b);font-size:.65rem;color:var(--blush);letter-spacing:.14em;text-transform:uppercase;font-style:italic;line-height:1;margin-top:2px}
.header-actions{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end}
.search-wrap{position:relative;flex:1;max-width:260px}
.search-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(196,120,138,.3);border-radius:30px;padding:7px 14px 7px 32px;color:var(--parchment);font-family:var(--font-b);font-size:.9rem;outline:none;transition:var(--tr)}
.search-input::placeholder{color:rgba(245,239,230,.4)}
.search-input:focus{background:rgba(255,255,255,.13);border-color:var(--blush)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--blush);font-size:.95rem;pointer-events:none}
.btn-scan{background:transparent;color:var(--parchment);border:1px solid rgba(196,120,138,.5);border-radius:30px;padding:7px 14px;font-family:var(--font-b);font-size:.85rem;cursor:pointer;transition:var(--tr);white-space:nowrap;flex-shrink:0}
.btn-scan:hover{background:rgba(196,120,138,.15);border-color:var(--blush)}
.btn-add{background:var(--gold);color:var(--burgundy-deep);border:none;border-radius:30px;padding:8px 18px;font-family:var(--font-d);font-size:.85rem;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:var(--tr);white-space:nowrap;flex-shrink:0}
.btn-add:hover{background:var(--gold-lt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(201,168,76,.4)}
